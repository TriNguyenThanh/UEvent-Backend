[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

[INPUT]
    Name          tail
    Path          /app/logs/audit.json
    Parser        json
    Tag           uevent.audit
    DB            /tmp/flb_audit.db
    Mem_Buf_Limit 10MB
    Skip_Long_Lines On

[FILTER]
    Name          modify
    Match         uevent.audit
    Add           service uevent-backend

[OUTPUT]
    Name          http
    Match         uevent.audit
    Host          openobserve
    Port          5080
    URI           /api/default/uevent_audit/_json
    Format        json
    Json_date_key _timestamp
    Json_date_format iso8601
    HTTP_User     ${OPENOBSERVE_USERNAME}
    HTTP_Passwd   ${OPENOBSERVE_PASSWORD}
    Retry_Limit   False
