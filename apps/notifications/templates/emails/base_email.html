<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject|default:"Thông báo từ UEvent" }}</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fff8f2; /* Ethereal background from web admin */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333333;
            line-height: 1.6;
        }
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .header {
            text-align: center;
            padding: 0 0 30px 0;
        }
        .header img {
            max-width: 160px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .card {
            background-color: #ffffff;
            border-radius: 16px;
            border: 1px solid rgba(255, 184, 0, 0.3); /* Full border, syncing with web admin glass border */
            box-shadow: 0 10px 25px rgba(255, 184, 0, 0.1); /* Soft amber shadow */
            padding: 35px;
        }
        .content {
            font-size: 16px;
        }
        .greeting {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 24px;
            color: #1a1a1a;
        }
        .highlight-box {
            background-color: #fffbeb; /* primary-50 */
            border: 1px solid #fde68a; /* primary-200 */
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            margin: 30px 0;
        }
        .highlight-title {
            font-size: 13px;
            color: #b45309; /* primary-700 */
            margin-bottom: 12px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1.5px;
        }
        .highlight-code {
            font-size: 36px;
            font-weight: 900;
            color: #d97706; /* primary-600 */
            letter-spacing: 6px;
            margin: 0;
        }
        .info-list {
            list-style: none;
            padding: 0;
            margin: 0;
            background-color: #fcfcfc;
            border: 1px solid #f0f0f0;
            border-radius: 12px;
            overflow: hidden;
        }
        .info-list li {
            border-bottom: 1px solid #f0f0f0;
            padding: 16px 20px;
            display: flex;
            align-items: flex-start;
        }
        .info-list li:last-child {
            border-bottom: none;
        }
        .info-label {
            font-weight: bold;
            color: #78350f; /* primary-900 */
            min-width: 100px;
            margin-right: 15px;
        }
        .footer {
            text-align: center;
            padding: 30px 20px 10px;
            font-size: 13px;
            color: #92400e; /* primary-800 */
            opacity: 0.8;
        }
        .footer p {
            margin: 5px 0;
        }
        .btn {
            display: inline-block;
            background-color: #ffb800; /* primary-container */
            color: #6b4c00 !important; /* on-primary-container */
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 800;
            margin-top: 25px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(255, 184, 0, 0.3);
            transition: all 0.2s ease;
        }
        .text-danger {
            color: #dc2626;
            background-color: #fef2f2;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #ef4444;
            font-size: 14px;
        }
        .text-waitlist {
            color: #b45309;
            background-color: #fffbeb;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #fcd34d;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <!-- Header -->
        <div class="header">
            <!-- Logo -->
            <img src="https://res.cloudinary.com/dkkvywz4g/image/upload/v1780654795/logo_kxy3gw.png" alt="UEvent Logo" width="100" height="100" style="border-radius:20px">
        </div>

        <!-- Body Card -->
        <div class="card">
            <div class="content">
                {% block content %}
                {% endblock content %}
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>&copy; {% now "Y" %} UEvent - Hệ thống Quản lý Sự kiện thuộc UCode Team.</p>
            <p>Email này được gửi tự động. Vui lòng không trả lời trực tiếp.</p>
        </div>
    </div>
</body>
</html>
