services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uevent_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HOST=db
      - PORT=5432
      - DJANGO_SETTINGS_MODULE=core.settings
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=uevent-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - OPENOBSERVE_URL=http://openobserve:5080
      - OPENOBSERVE_ORGANIZATION=default
      - OPENOBSERVE_AUDIT_STREAM=uevent_audit
      - OPENOBSERVE_USERNAME=root@example.com
      - OPENOBSERVE_PASSWORD=${OPENOBSERVE_ROOT_PASSWORD:-OpenObservePass123!}
    command: ["/bin/sh", "/app/entrypoint.sh"]
    ports:
      - "8000:8000"
    volumes:
      - app_logs:/app/logs
      - ./firebase-service-account.json:/run/firebase-service-account.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: uevent_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - app
    networks:
      - backend

  notification-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uevent_notification_scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - HOST=db
      - PORT=5432
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=uevent-notification-scheduler
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    command:
      - /bin/sh
      - -c
      - |
        echo "Waiting for database at $${HOST}:$${PORT}..."
        while ! nc -z "$${HOST}" "$${PORT}"; do
          sleep 1
        done
        echo "Notification scheduler is running"
        while true; do
          python manage.py publish_scheduled_notifications --batch-size "$${NOTIFICATION_SCHEDULER_BATCH_SIZE:-100}" || true
          sleep "$${NOTIFICATION_SCHEDULER_INTERVAL_SECONDS:-60}"
        done
    volumes:
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - backend

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uevent_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HOST=db
      - PORT=5432
      - DJANGO_SETTINGS_MODULE=core.settings
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=uevent-celery-worker
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    command: ["celery", "-A", "core", "worker", "--loglevel=INFO"]
    volumes:
      - app_logs:/app/logs
      - ./firebase-service-account.json:/run/firebase-service-account.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      jaeger:
        condition: service_started
    networks:
      - backend

  db:
    image: postgres:16-alpine
    container_name: postgres_server
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: redis_server
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: openobserve
    restart: unless-stopped
    environment:
      - ZO_DATA_DIR=/data
      - ZO_ROOT_USER_EMAIL=root@example.com
      - ZO_ROOT_USER_PASSWORD=${OPENOBSERVE_ROOT_PASSWORD:-OpenObservePass123!}
    ports:
      - "5080:5080"
    volumes:
      - openobserve_data:/data
    networks:
      - backend

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "6831:6831/udp"
    networks:
      - backend

  fluent-bit:
    image: fluent/fluent-bit:3.0
    container_name: fluent_bit
    restart: unless-stopped
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/fluent-bit.conf"]
    environment:
      - OPENOBSERVE_USERNAME=root@example.com
      - OPENOBSERVE_PASSWORD=${OPENOBSERVE_ROOT_PASSWORD:-OpenObservePass123!}
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - app_logs:/app/logs:ro
    depends_on:
      - openobserve
    networks:
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  openobserve_data:
    driver: local
  app_logs:
    driver: local

networks:
  backend:
    driver: bridge
