services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uevent_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - HOST=db
      - PORT=5432
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=uevent-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    command: ["/bin/sh", "/app/entrypoint.sh"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - backend

  notification-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uevent_notification_scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - HOST=db
      - PORT=5432
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=uevent-notification-scheduler
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    command:
      - /bin/sh
      - -c
      - |
        echo "Waiting for database at $${HOST}:$${PORT}..."
        while ! nc -z "$${HOST}" "$${PORT}"; do
          sleep 1
        done
        echo "Notification scheduler is running"
        while true; do
          python manage.py publish_scheduled_notifications --batch-size "$${NOTIFICATION_SCHEDULER_BATCH_SIZE:-100}" || true
          sleep "$${NOTIFICATION_SCHEDULER_INTERVAL_SECONDS:-60}"
        done
    volumes:
      - .:/app
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - backend

  db:
    image: postgres:16-alpine
    container_name: postgres_server
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - backend

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - backend

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: opensearch_dashboards
    restart: unless-stopped
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    networks:
      - backend

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "6831:6831/udp"
    networks:
      - backend

  fluent-bit:
    image: fluent/fluent-bit:3.0
    container_name: fluent_bit
    restart: unless-stopped
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/fluent-bit.conf"]
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - app_logs:/app/logs:ro
    depends_on:
      - opensearch
    networks:
      - backend

  adminer:
    image: adminer:latest
    container_name: adminer_client
    restart: always
    ports:
      - "8080:8080"
    networks:
      - backend
    depends_on:
      - db

volumes:
  postgres_data:
    driver: local
  opensearch_data:
    driver: local
  app_logs:
    driver: local

networks:
  backend:
    driver: bridge
