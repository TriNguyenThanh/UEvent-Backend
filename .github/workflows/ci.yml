name: Django CI

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read

jobs:
  test:
    if: github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarQube needs full history for blame information
      - name: Build CI image
        run: docker build -f Dockerfile.ci --target test -t uevent-ci .
      - name: Run tests
        run: docker run --rm -e CI=true -e USE_SQLITE=true -e SECRET_KEY=ci-secret-key uevent-ci

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  e2e-test:
    if: github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-playwright pytest-django

      - name: Ensure browsers are installed
        run: python -m playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          CI: true
          USE_SQLITE: true
          SECRET_KEY: e2e-secret-key
        run: pytest e2e_tests/
