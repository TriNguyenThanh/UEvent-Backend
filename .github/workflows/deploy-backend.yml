name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy on EC2
    runs-on: [self-hosted, Linux]
    timeout-minutes: 30

    steps:
      - name: Prepare runner workspace
        run: |
          set -euo pipefail

          if [ -d "$GITHUB_WORKSPACE" ]; then
            if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"
              sudo find "$GITHUB_WORKSPACE" -type d -name "__pycache__" -prune -exec rm -rf {} +
              sudo find "$GITHUB_WORKSPACE" -type f -name "*.pyc" -delete
              sudo rm -rf "$GITHUB_WORKSPACE/logs"
            else
              chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" 2>/dev/null || true
              find "$GITHUB_WORKSPACE" -type d -name "__pycache__" -prune -exec rm -rf {} + 2>/dev/null || true
              find "$GITHUB_WORKSPACE" -type f -name "*.pyc" -delete 2>/dev/null || true
              rm -rf "$GITHUB_WORKSPACE/logs" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Load EC2 environment files
        run: |
          set -euo pipefail

          ENV_FILE_PATH="${BACKEND_ENV_FILE_PATH:-/opt/uevent/backend/.env}"
          FIREBASE_FILE_PATH="${FIREBASE_SERVICE_ACCOUNT_PATH:-/opt/uevent/backend/firebase-service-account.json}"

          copy_private_file() {
            source_path="$1"
            target_path="$2"

            if [ -r "$source_path" ]; then
              install -m 600 "$source_path" "$target_path"
              return
            fi

            if sudo -n true 2>/dev/null; then
              sudo install -m 600 -o "$(id -u)" -g "$(id -g)" "$source_path" "$target_path"
              return
            fi

            echo "::error::Runner user cannot read $source_path. Grant read permission or allow passwordless sudo."
            exit 1
          }

          if [ ! -f "$ENV_FILE_PATH" ]; then
            echo "::error::Missing backend env file on EC2: $ENV_FILE_PATH"
            exit 1
          fi

          copy_private_file "$ENV_FILE_PATH" .env

          if [ -f "$FIREBASE_FILE_PATH" ]; then
            copy_private_file "$FIREBASE_FILE_PATH" firebase-service-account.json
          else
            printf '{}\n' > firebase-service-account.json
            chmod 600 firebase-service-account.json
          fi

      - name: Check Docker
        run: |
          set -euo pipefail

          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            DOCKER="docker"
          elif command -v sudo >/dev/null 2>&1 && sudo -n docker info >/dev/null 2>&1; then
            DOCKER="sudo docker"
          else
            echo "::error::Docker is not installed or the runner user cannot access it. Add the runner user to the docker group or allow passwordless sudo for docker."
            exit 1
          fi

          if ! $DOCKER compose version >/dev/null 2>&1 \
            && ! docker-compose version >/dev/null 2>&1 \
            && ! sudo -n docker-compose version >/dev/null 2>&1; then
            echo "::error::Docker Compose not found. Install the Docker Compose plugin or docker-compose."
            exit 1
          fi

      - name: Deploy with Docker Compose
        run: |
          set -euo pipefail

          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            DOCKER="docker"
          elif command -v sudo >/dev/null 2>&1 && sudo -n docker info >/dev/null 2>&1; then
            DOCKER="sudo docker"
          else
            echo "::error::Runner user cannot access Docker. Add it to the docker group or allow passwordless sudo for docker."
            exit 1
          fi

          if $DOCKER compose version >/dev/null 2>&1; then
            COMPOSE="$DOCKER compose"
          elif command -v docker-compose >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          elif command -v sudo >/dev/null 2>&1 && sudo -n docker-compose version >/dev/null 2>&1; then
            COMPOSE="sudo docker-compose"
          else
            echo "::error::Docker Compose not found or cannot access Docker."
            exit 1
          fi

          $COMPOSE build
          $COMPOSE up -d db redis jaeger openobserve
          $COMPOSE run --rm app python manage.py migrate --noinput
          $COMPOSE up -d --remove-orphans
          $COMPOSE restart nginx
          $COMPOSE ps

      - name: Cleanup Docker images
        if: always()
        run: |
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            docker image prune -f
          elif command -v sudo >/dev/null 2>&1 && sudo -n docker info >/dev/null 2>&1; then
            sudo docker image prune -f
          fi
